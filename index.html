<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>music time!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
        <div id="window-controls">
            <button><i id="close" class="fa-solid fa-xmark"></i></button>
        </div>
    <div id="music-player">
        <img id="song-image" class="cover" src="./music & covers/cover1.jpg" />
        <div id="song-title">Song Title</div>
        <div id="song-artist">Artist Name</div>

        <input id="song-slider" type="range">

        <div id="song-controls">
            <button><i id="shuffle" class="fa-solid fa-dice-six"></i></button>
            <button><i id="prev" class="fa-solid fa-angle-left fa-2x"></i></button>
            <button><i id="playpause" class="fa-regular fa-circle-play fa-3x"></i></button>
            <button><i id="next" class="fa-solid fa-angle-right fa-2x"></i></button>
            <button><i id="loop" class="fa-solid fa-arrows-rotate"></i></button>
        </div>

    </div>
    <script src="script.js" defer></script>
  </body>
</html>
